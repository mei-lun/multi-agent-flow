[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "maf-observability"
version = "0.0.0"
description = "Multi-Agent Flow shared observability: structured logging, correlation IDs and redaction."
requires-python = ">=3.11"
dependencies = [
  "structlog>=24.1",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-dir]
"" = "src"
